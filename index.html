<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectPulse Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div id="app">
      <section id="login-screen" class="card">
        <h1>ProjectPulse</h1>
        <p class="muted">Secure access for project operations</p>
        <form id="login-form">
          <input id="username" placeholder="Username" required />
          <input id="password" type="password" placeholder="Password" required />
          <select id="role-select">
            <option value="editor">Editor Access</option>
            <option value="viewer">View Only Access</option>
          </select>
          <button type="submit">Login</button>
          <small>Demo password: <b>admin123</b></small>
        </form>
      </section>

      <main id="dashboard" class="hidden">
        <header class="topbar card">
          <div>
            <h2>Project Dashboard</h2>
            <p class="muted" id="welcome-text"></p>
          </div>
          <div class="header-actions">
            <button id="add-project-btn">+ New Project</button>
            <button id="logout-btn" class="secondary">Logout</button>
          </div>
        </header>

        <section class="kpi-grid" id="kpi-grid"></section>

        <section class="chart-grid">
          <article class="card section"><canvas id="statusChart"></canvas></article>
          <article class="card section"><canvas id="financialChart"></canvas></article>
        </section>

        <section class="card section">
          <h3>Projects</h3>
          <div id="delay-alerts"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Project</th>
                  <th>Client</th>
                  <th>Status</th>
                  <th>Progress</th>
                  <th>Billing Ratio</th>
                  <th>Deadline</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="project-rows"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div id="project-modal" class="modal hidden">
      <div class="modal-content card">
        <div class="modal-head">
          <h3 id="modal-title">Project Details</h3>
          <div class="modal-title-actions">
            <button id="edit-overview-btn" class="secondary">Edit Overview</button>
            <button id="close-modal" class="close ghost">✕</button>
          </div>
        </div>

        <div class="tabs">
          <button data-tab="overview" class="active">Overview</button>
          <button data-tab="phases">Phases</button>
          <button data-tab="payments">Payments</button>
          <button data-tab="expenses">Expenses</button>
          <button data-tab="files">Files & QR</button>
        </div>

        <div class="tab-body" id="tab-overview"></div>
        <div class="tab-body hidden" id="tab-phases"></div>
        <div class="tab-body hidden" id="tab-payments"></div>
        <div class="tab-body hidden" id="tab-expenses"></div>
        <div class="tab-body hidden" id="tab-files"></div>
      </div>
    </div>

    <footer>Developed by Abhishek Jariwala</footer>
    <script src="app.js"></script>
  </body>
</html>
